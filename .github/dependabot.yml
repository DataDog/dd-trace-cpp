version: 2
updates:
- package-ecosystem: bazel
  directory: /
  schedule:
    interval: monthly
  groups:
    bazel-packages:
      patterns:
      - '*'
  cooldown:
    default-days: 14
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: monthly
  groups:
    gh-actions-packages:
      patterns:
      - '*'
  cooldown:
    default-days: 14
